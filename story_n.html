<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>N 的調查 · Case No VIXX</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .story-container { max-width: 800px; margin: 0 auto; }
        .dialogue-container { margin: 1rem 0; }
        .puzzle-area {
            background: #0b0e16cc;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin: 1.5rem 0;
            border-left: 4px solid #c6a15b;
        }
        .puzzle-area input {
            width: 100%;
            padding: 0.8rem;
            background: #1e232e;
            border: 1px solid #7c8aa0;
            color: #eef2f5;
            border-radius: 2rem;
            margin: 0.5rem 0;
            font-size: 1rem;
        }
        .attempts-left { font-size: 0.8rem; color: #b9c7d4; margin-top: 0.3rem; }
        .feedback { margin-top: 0.8rem; padding: 0.5rem; border-radius: 1rem; }
        .correct-feedback { color: #a3e0a0; }
        .wrong-feedback { color: #e0a0a0; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1f29;
            border-radius: 1.8rem;
            max-width: 550px;
            width: 90%;
            padding: 1.5rem;
            border: 1px solid #b48c48;
            max-height: 80vh;
            overflow-y: auto;
        }
        .evidence-item {
            background: #00000055;
            margin: 0.8rem 0;
            padding: 0.8rem;
            border-radius: 1rem;
            border-left: 3px solid #dbb87c;
        }
        .evidence-title { font-weight: bold; color: #ecd9b4; }
        .evidence-desc { font-size: 0.85rem; margin-top: 0.3rem; white-space: pre-line; }
        .evidence-note { color: #aaaaaa; font-style: italic; margin-top: 0.3rem; font-size: 0.8rem; }
        .close-modal, .continue-btn { background: #4c5a6e; border: none; margin-top: 1rem; }
        .flex-buttons { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .option-btn {
            background: #2d3440;
            border-color: #6e7b6e;
            color: #eceff4;
            min-width: 140px;
        }
        .option-btn:hover { background: #4c5a6e; }
        .disabled-option { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
<div class="game-container story-container">
    <div id="storyContent"></div>
    <div class="flex-buttons" style="margin-top: 2rem;">
        <button id="viewEvidenceBtn" class="btn-secondary">檢視證物</button>
        <button id="abandonBtn" class="btn-secondary">放棄調查</button>
    </div>
</div>
<div id="evidenceModal" class="modal">
    <div class="modal-content">
        <h3>目前證物清單</h3>
        <div id="evidenceListModal"></div>
        <button id="closeModalBtn" class="close-modal">關閉</button>
    </div>
</div>
<script src="common.js"></script>
<script>
    // ----- 全域 -----
    let currentStep = 0;               // 0:開頭 1:場景一 2:第一次三選 3:結果 4:證詞成功對話 5:第二次選擇 6:第二次結果 7:密碼前對話 8:密碼輸入 9:密碼結果 10:結尾假證物
    let trustLevel = 0;               // 0=失敗,1=中性,2=成功 (第一次選擇)
    let detailLevel = 0;              // 0=失敗,1=中性,2=成功 (第二次選擇)
    let finalOutcome = 0;             // 0=失敗無證詞,1=殘缺證詞(假),2=部分真實證詞(真但弱),3=完整真實證詞
    let secondChoiceCorrect = false;   // 第二次選擇(簽名)是否正確
    let passwordSuccess = false;
    let evidenceCollected = [];
    let attemptsLeft = 3;
    let selectedChoice1 = false;
    let selectedChoice2 = false;

    // 證物定義 (真證物描述包含燒毀四十七套防護服)
    const REAL_EVIDENCE_FULL = {
        name: "米哈烏的完整證詞錄音與簽名文件",
        description: "證人：米哈烏·科瓦爾斯基，原 D-7 實驗室高級實驗助理\n證詞內容：\n- D-7 項目為生物武器研發，針對特定人種。\n- 1944 年 3 月 15 日，B 區發生高濃度活病毒洩漏。\n- 主管 K.B. 下令連夜燒毀四十七套防護服及所有污染物品，並焚燒三具屍體。\n- 事後被要求統一對外稱「流感」。\n證人簽名：米哈烏·科瓦爾斯基（附手印）\n錄音時間：1944 年 X 月 X 日\n(備註：證詞細節完整，情緒真實。)",
        note: "（筆記：完整且可信，無矛盾。）",
        isReal: true
    };
    const REAL_EVIDENCE_PARTIAL = {
        name: "米哈烏的部分證詞錄音",
        description: "證人：米哈烏·科瓦爾斯基\n證詞內容：\n- 1944 年 3 月 15 日實驗室發生洩漏。\n- 主管下令燒毀物品和防護服，但未說明數量。\n- 事後被要求統一說法。\n證人簽名較為潦草，錄音中途有猶豫。",
        note: "（筆記：基本屬實，但缺乏關鍵細節，可信度稍低。）",
        isReal: true
    };
    const REAL_EVIDENCE_2 = {
        name: "主管 K.B. 的私人筆記",
        description: "1944 年 3 月 14 日：收到指示，加快 D-7 的實戰測試。計劃下週在三個村莊進行水污染模擬。\n1944 年 3 月 15 日：災難。B 區洩漏。已下令全面銷毀物證。\n1944 年 3 月 16 日：焚燒工作完成。統一對外口徑為斑疹傷寒。\n1944 年 3 月 20 日：抵抗組織似乎聽到風聲。必須轉移焦點。已準備數封信件。",
        note: "（筆記：筆跡吻合，日期連續，鐵證。）",
        isReal: true
    };
    const FAKE_EVIDENCE_1 = {
        name: "匿名檢舉信",
        description: "「致有關方面：\n我親眼見到抵抗組織的一名頭目，代號『烏鴉』，於 3 月 20 日從 D-7 實驗室後門帶出一個金屬箱子，裡面裝的是病毒樣本。他們打算嫁禍給軍方。\n請務必調查此人。\n一個愛國者」",
        note: "（筆記：紙質異常，後門已封，字跡工整無摺痕，高度懷疑是偽造。）",
        isReal: false
    };
    const FAKE_EVIDENCE_2 = {
        name: "虛假死亡統計表（殘頁）",
        description: "「…截至 4 月 1 日，D-7 區域感染人數 312，死亡 7 人，死亡率 2.2%。疫情已受控，無需特別措施。…此數據上報。」",
        note: "（筆記：統計起始日期刻意忽略洩漏初期，死亡人數與民間記錄不符，水印1945年。）",
        isReal: false
    };
    const FAKE_EVIDENCE_3 = {
        name: "偽造的會議記錄",
        description: "1944 年 3 月 10 日，D-7 項目例會紀要：\n主題：評估針對敵後游擊隊的生物製劑效果。\n結論：準備在 4 月進行田野試驗。",
        note: "（筆記：格式不符，簽名人不存在，內容聳動刻意栽贓。）",
        isReal: false
    };

    function addEvidence(ev) {
        if (!evidenceCollected.some(e => e.name === ev.name)) {
            evidenceCollected.push(ev);
            updateEvidenceModal();
        }
    }
    function updateEvidenceModal() {
        const container = document.getElementById('evidenceListModal');
        if (!container) return;
        if (evidenceCollected.length === 0) { container.innerHTML = '<p>尚無證物。</p>'; return; }
        container.innerHTML = evidenceCollected.map(ev => `
            <div class="evidence-item">
                <div class="evidence-title">${ev.name}</div>
                <div class="evidence-desc">${ev.description.replace(/\n/g, '<br>')}</div>
                <div class="evidence-note">${ev.note || ''}</div>
            </div>
        `).join('');
    }
    function finishAndSave() {
        const success = markRoleComplete('N', evidenceCollected);
        if (success) alert('調查完成，證物已收錄。');
        else alert('錯誤：無法儲存進度，可能已完成過。');
        window.location.href = 'main.html';
    }
    function abandon() {
        if (confirm('確定要放棄調查嗎？進度不會儲存。')) {
            window.location.href = 'main.html';
        }
    }

    // ----- 渲染場景 -----
    function renderScene0() {
        return `
            <div class="dialogue-container">
                <div class="narration-text">凌晨一點二十分，抵抗組織聯絡員「烏鴉」帶我穿過三條被炸毀的街道。宵禁剛剛開始，遠處偶爾傳來巡邏隊的腳步聲。</div>
                <div class="narration-text">我們在一棟廢棄裁縫店的衣櫃後面停下。烏鴉拉開暗門，露出向下的石階。煤油燈的氣味混著潮濕的霉味。</div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">烏鴉</span></div><div class="speaker-text">「人在下面，他叫米哈烏·科瓦爾斯基。戰前是華沙大學生物系的實驗員。三週前他自己找上我們，說知道 D-7 的秘密。但他一直不肯說全。」</div></div>
                <div class="narration-text">我把懷表從馬甲口袋裡取出，握在手心。金屬的涼意讓我集中注意力。</div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span></div><div class="speaker-text">「你守在門口，如果聽到我拍桌子三聲，就帶人進來。」</div></div>
                <div class="narration-text">烏鴉沒有回答，只是把一把手槍遞給我。我拒絕了。審訊不是靠槍進行的。</div>
            </div>
            <div class="flex-buttons"><button id="nextStepBtn" class="btn-primary">繼續</button></div>
        `;
    }
    function renderScene1Start() {
        return `
            <div class="dialogue-container">
                <div class="narration-text">（走下樓梯，煤油燈的光照出一個中年男子蜷縮在木椅上。他穿著灰色毛衣，袖口起毛，左手虎口有舊繭。）</div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(走進地下室，把懷表放在桌上，沒有坐下，坐在他對面)</span></div><div class="speaker-text">「米哈烏·科瓦爾斯基。你左手虎口的繭，是長期抓握試管架留下的。戰前華沙大學微生物實驗室的人員名單裡，有你。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(身體一僵，不敢抬頭)</span></div><div class="speaker-text">「……那些都是過去的事了。我現在只是個倉庫管理員。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(沉默，右手拇指輕輕轉動懷表表殼。二十秒後，開口)</span></div><div class="speaker-text">「你結婚多久了？」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(疑惑)</span></div><div class="speaker-text">「……十二年。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(語氣不變)</span></div><div class="speaker-text">「你女兒叫艾蓮娜，今年十歲。她喜歡畫畫。上次她畫了一幅向日葵，你太太把它貼在廚房冰箱上。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(猛地抬頭，驚慌)</span></div><div class="speaker-text">「你……你怎麼知道這些？」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(平靜)</span></div><div class="speaker-text">「因為我在來之前，見過你太太。她說你已經三個月沒回家了。她很擔心你。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(嘴唇顫抖)</span></div><div class="speaker-text">「她……她們安全嗎？」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(從口袋裡拿出一張摺疊的紙條，推過去)</span></div><div class="speaker-text">「這是她今天寫的。你自己看。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(顫抖著手打開，眼眶泛紅)</span></div><div class="speaker-text">「……她寫說有人送食物過去，還幫艾蓮娜找了老師。你到底是誰？」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(將懷表輕輕推向桌子中央，金屬反光映在米哈烏臉上)</span></div><div class="speaker-text">「一個想幫你活下去的人。但你需要先幫我。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(沉默，手指不再抖，緊握成拳)</span></div><div class="speaker-text">「……好。你想知道什麼？」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(身體微微前傾)</span></div><div class="speaker-text">「三月十五日，D-7 實驗室發生了什麼？」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(猶豫)</span></div><div class="speaker-text">「我說了，他們會殺我全家。你怎麼保證我說完之後，你和你的組織不會丟下我？」</div></div>
            </div>
            <div class="flex-buttons"><button id="nextStepBtn" class="btn-primary">繼續</button></div>
        `;
    }

    // 第一次選擇 (三次子選擇)
    function renderFirstChoiceRound1() {
        return `
            <div class="puzzle-area">
                <p><strong>系統提示</strong>：米哈烏需要信任。你如何回應？</p>
                <div class="flex-buttons">
                    <button id="choice1_A" class="option-btn">「我不需要你信任我。你太太和女兒的地址只有我知道。我們是利益共同體。」</button>
                    <button id="choice1_B" class="option-btn">「我沒辦法給你百分百保證，但過去三個月我保護過六個像你一樣的證人，沒有一個出事。」</button>
                    <button id="choice1_C" class="option-btn">「你沒有選擇。不說，你家人今晚就會被轉移到拘留營。」</button>
                </div>
                <div id="choiceFeedback" class="feedback"></div>
            </div>
        `;
    }
    function renderFirstChoiceRound2() {
        return `
            <div class="puzzle-area">
                <p><strong>系統提示</strong>：米哈烏開始描述洩漏當天，但說到關鍵處停頓。你如何引導他說出更多？</p>
                <div class="flex-buttons">
                    <button id="choice2_A" class="option-btn">「那天一定很可怕。罐子倒下去的時候，你第一個念頭是什麼？」</button>
                    <button id="choice2_B" class="option-btn">「你當時站在哪裡？距離洩漏點多遠？」</button>
                    <button id="choice2_C" class="option-btn">「防護服為什麼會少三十五套？是不是有人隱瞞了真實感染人數？」</button>
                </div>
                <div id="choiceFeedback2" class="feedback"></div>
            </div>
        `;
    }
    function renderFirstChoiceRound3() {
        return `
            <div class="puzzle-area">
                <p><strong>系統提示</strong>：米哈烏突然閉嘴，眼神閃爍。你需要最後一搏。</p>
                <div class="flex-buttons">
                    <button id="choice3_A" class="option-btn">「這是你女兒昨天畫的。她問媽媽，爸爸什麼時候回來。」(拿出照片)</button>
                    <button id="choice3_B" class="option-btn">「如果你說出主管藏匿證據的位置，我可以讓你和你家人優先離開。」</button>
                    <button id="choice3_C" class="option-btn">「時間到了。你不說，我走。你等的人不會來了。」</button>
                </div>
                <div id="choiceFeedback3" class="feedback"></div>
            </div>
        `;
    }

    function renderFirstChoiceOutcome() {
        let msg = '';
        let canProceed = true;
        if (trustLevel === 0) {
            msg = '<span class="wrong-feedback">米哈烏嚇得縮在角落，拒絕再開口。審訊失敗。</span>';
            canProceed = false;
            finalOutcome = 0;
        } else if (trustLevel === 1) {
            if (detailLevel === 0) {
                msg = '<span class="wrong-feedback">米哈烏變得極度防衛，審訊中斷。</span>';
                canProceed = false;
                finalOutcome = 0;
            } else if (detailLevel === 1) {
                msg = '<span class="correct-feedback">米哈烏說出部分事實，但仍有保留。證詞殘缺。</span>';
                finalOutcome = 1;
            } else {
                msg = '<span class="correct-feedback">米哈烏放下戒心，說出完整經過。</span>';
                finalOutcome = 3;
            }
        } else { // trustLevel === 2
            if (detailLevel === 0) {
                msg = '<span class="wrong-feedback">米哈烏突然沉默，需要最後一搏。</span>';
                // 進入第三次選擇，這裡先不顯示結果，等待第三次選擇
                return null;
            } else if (detailLevel === 1) {
                msg = '<span class="correct-feedback">米哈烏說出基本事實，但缺乏情感細節。證詞部分可信。</span>';
                finalOutcome = 2;
            } else {
                msg = '<span class="correct-feedback">米哈烏哽咽說出所有細節，證詞完整。</span>';
                finalOutcome = 3;
            }
        }
        if (canProceed === false || finalOutcome !== 0) {
            return `<div class="puzzle-area"><p>${msg}</p><div class="flex-buttons"><button id="continueAfterChoiceBtn" class="btn-primary">繼續</button></div></div>`;
        }
        return null;
    }

    function renderFirstChoiceRound3Result() {
        // 第三次選擇結果，僅在 trustLevel===2 && detailLevel===0 時出現
        let msg = '';
        let thirdCorrect = false;
        // 會由外部變數記錄 thirdChoiceResult，這裡簡單處理：先用一個變數
        return `
            <div class="puzzle-area">
                <p id="thirdOutcomeMsg"></p>
                <div class="flex-buttons"><button id="continueAfterChoice3Btn" class="btn-primary">繼續</button></div>
            </div>
        `;
    }

    function renderAfterFirstSuccess() {
        // 根據 finalOutcome 顯示不同證詞內容
        let dialogue = '';
        if (finalOutcome === 3) {
            dialogue = `<div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(深吸一口氣)</span></div><div class="speaker-text">「D-7 是 1942 年開始的秘密項目。對外說是研究斑疹傷寒疫苗，但實際上……是在改造一種病毒，讓它只感染特定人種。主管 K.B. 說這是『為了戰爭勝利後的秩序維護』。我們實驗室有三個核心區域：A 區培育病毒，B 區做動物實驗，C 區保存樣本和檔案。三月十五日下午，B 區的搬運工人在換罐子的時候，把培養罐碰倒了。那罐子裡是高濃度的活體病毒，而且是氣溶膠型的。警報響了不到三十秒就停了——主管說不能引人注意。他命令我們立刻撤離，然後連夜把所有接觸過的器材、四十七套防護服和……死人，都拉到後山燒了。一共燒了多少？我清點過：四十七套防護服，三個鐵桶的廢料，還有……三具屍體。兩個是當時的操作員，一個是第二天發病的清潔工。主管說：『戰爭快結束了，只要拖到投降，就沒人會追查。如果有人問，就說是普通流感。』」</div></div>`;
        } else if (finalOutcome === 2) {
            dialogue = `<div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span></div><div class="speaker-text">「三月十五日發生洩漏，主管叫我們燒掉防護服和器材，還燒了幾具屍體。之後統一說是流感。詳細數量我不記得了。」</div></div>`;
        } else if (finalOutcome === 1) {
            dialogue = `<div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span></div><div class="speaker-text">「發生洩漏……主管下令銷毀證據……我只能說這麼多。」</div></div>`;
        } else {
            // 失敗不該到這裡
            dialogue = `<div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span></div><div class="speaker-text">「……毫無收穫。」</div></div>`;
        }
        return `
            <div class="dialogue-container">
                ${dialogue}
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(平靜)</span></div><div class="speaker-text">「你願意把剛才說的錄下來，簽上名字，作為證詞嗎？」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(點頭)</span></div><div class="speaker-text">「好。但我有一個條件——事成之後，我要帶著家人去瑞典。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(點頭)</span></div><div class="speaker-text">「我會安排。」</div></div>
            </div>
            <div class="flex-buttons"><button id="nextStepBtn" class="btn-primary">繼續</button></div>
        `;
    }

    function renderSecondChoice() {
        return `
            <div class="puzzle-area">
                <p><strong>系統提示</strong>：米哈烏願意配合，你需要確保證詞具有法律效力。</p>
                <div class="flex-buttons">
                    <button id="choice2_A" class="option-btn">拿出錄音筆和標準證詞文件，請他簽名並錄音。</button>
                    <button id="choice2_B" class="option-btn">口頭承諾，只用筆記記錄。</button>
                    <button id="choice2_C" class="option-btn">讓他先寫關鍵詞在廢紙上，說回去再整理。</button>
                </div>
                <div id="choice2Feedback" class="feedback"></div>
            </div>
        `;
    }
    function renderSecondChoiceResult(isCorrect) {
        const msg = isCorrect ? '<span class="correct-feedback">米哈烏簽署文件並錄音。獲得證詞。</span>' : '<span class="wrong-feedback">米哈烏感覺你沒有誠意，拒絕簽字。證詞無效。</span>';
        return `<div class="puzzle-area"><p>${msg}</p><div class="flex-buttons"><button id="continueAfterChoice2Btn" class="btn-primary">繼續</button></div></div>`;
    }
    function renderPasswordIntro() {
        return `
            <div class="dialogue-container">
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(走出地下室，對 Hyuk 發送無線電)</span></div><div class="speaker-text">「相爀，我需要你幫我進入工廠二樓，K.B. 的辦公室。米哈烏說暗格在書架第三層，後面有一個金屬盒。位置圖我馬上傳給你。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">Hyuk</span><span class="action">(無線電回復，壓低聲音)</span></div><div class="speaker-text">「我已經在工廠外圍了。守衛換班還有不到四分鐘。你有密碼嗎？」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(看著米哈烏畫的紙條)</span></div><div class="speaker-text">「米哈烏只記得和日期有關。他說主管辦公室掛著一本日曆，三月十五日被紅筆圈起來。另外，他見過主管在本子上寫下一串數字，似乎和防護服數量有關。密碼可能是六位數。」</div></div>
                <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">Hyuk</span><span class="action">(低聲)</span></div><div class="speaker-text">「我試試。」</div></div>
            </div>
            <div class="flex-buttons"><button id="nextStepBtn" class="btn-primary">繼續</button></div>
        `;
    }
    function renderPasswordPuzzle() {
        attemptsLeft = 3;
        return `
            <div class="puzzle-area">
                <p><strong>密碼破譯</strong>：根據對話線索（洩漏日期、防護服數量等），推斷暗格的六位數密碼。</p>
                <input type="text" id="pwdInput" placeholder="請輸入六位數字密碼" maxlength="6">
                <div class="attempts-left">剩餘嘗試次數：3</div>
                <button id="submitPwdBtn" class="btn-primary">確認密碼</button>
                <div id="pwdFeedback" class="feedback"></div>
            </div>
        `;
    }
    function renderPasswordResult(success) {
        const msg = success ? '<span class="correct-feedback">密碼正確！獲得主管 K.B. 的私人筆記。</span>' : '<span class="wrong-feedback">警報觸發！暗格被銷毀，無法獲得筆記。</span>';
        return `<div class="puzzle-area"><p>${msg}</p><div class="flex-buttons"><button id="continueAfterPwdBtn" class="btn-primary">繼續</button></div></div>`;
    }
    function renderScene3() {
        let html = `<div class="dialogue-container">`;
        if (!evidenceCollected.some(e => e.name === FAKE_EVIDENCE_1.name)) {
            html += `<div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span><span class="action">(從衣服內襯裡拿出一封皺巴巴的信)</span></div><div class="speaker-text">「這是我前天在家門口發現的。不知道是誰塞的。我本來想扔掉，但是上面寫的東西……我覺得不太對。」</div></div>
            <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span><span class="action">(接過來，打開閱讀)</span></div><div class="speaker-text">「……」</div></div>`;
            addEvidence(FAKE_EVIDENCE_1);
        }
        if (!evidenceCollected.some(e => e.name === FAKE_EVIDENCE_2.name)) {
            html += `<div class="narration-text">N 彎腰從地上撿起半張紙片。</div>
            <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">N</span></div><div class="speaker-text">「這是什麼？」</div></div>
            <div class="dialogue-bubble"><div class="speaker-name"><span class="speaker-name-text">米哈烏</span></div><div class="speaker-text">「哦，那是上週有人從門縫塞進來的另一張紙。上面寫的是……一些統計數字。我覺得假得很，就扔地上了。」</div></div>`;
            addEvidence(FAKE_EVIDENCE_2);
        }
        html += `</div><div class="flex-buttons"><button id="finishBtn" class="btn-primary">完成調查</button></div>`;
        return html;
    }

    // ----- 流程控制（狀態機）-----
    let state = 0; // 0,1,2,3...
    function loadStep(step) {
        const container = document.getElementById('storyContent');
        if (!container) return;
        let html = '';
        switch(step) {
            case 0: html = renderScene0(); break;
            case 1: html = renderScene1Start(); break;
            case 2: html = renderFirstChoiceRound1(); break;
            case 3: html = renderFirstChoiceRound2(); break;
            case 4: html = renderFirstChoiceRound3(); break;
            case 5: html = renderFirstChoiceOutcome(); if (!html) { loadStep(4); return; } break;
            case 6: html = renderAfterFirstSuccess(); break;
            case 7: html = renderSecondChoice(); break;
            case 8: html = renderSecondChoiceResult(secondChoiceCorrect); break;
            case 9: html = renderPasswordIntro(); break;
            case 10: html = renderPasswordPuzzle(); break;
            case 11: html = renderPasswordResult(passwordSuccess); break;
            case 12: html = renderScene3(); break;
            default: return;
        }
        container.innerHTML = html;
        attachEvents(step);
    }

    let round1Result = 0, round2Result = 0, round3Result = 0;
    function attachEvents(step) {
        if (step === 0 || step === 1 || step === 6 || step === 9) {
            const btn = document.getElementById('nextStepBtn');
            if (btn) btn.onclick = () => loadStep(step + 1);
        }
        else if (step === 2) {
            const optA = document.getElementById('choice1_A');
            const optB = document.getElementById('choice1_B');
            const optC = document.getElementById('choice1_C');
            const handle = (val) => {
                if (selectedChoice1) return;
                selectedChoice1 = true;
                round1Result = val; // 2=A,1=B,0=C
                if (val === 2) trustLevel = 2;
                else if (val === 1) trustLevel = 1;
                else trustLevel = 0;
                document.getElementById('choiceFeedback').innerHTML = `<span class="correct-feedback">已選擇。</span>`;
                [optA, optB, optC].forEach(b => b.disabled = true);
                loadStep(3);
            };
            if (optA) optA.onclick = () => handle(2);
            if (optB) optB.onclick = () => handle(1);
            if (optC) optC.onclick = () => handle(0);
        }
        else if (step === 3) {
            const optA = document.getElementById('choice2_A');
            const optB = document.getElementById('choice2_B');
            const optC = document.getElementById('choice2_C');
            const handle = (val) => {
                if (selectedChoice2) return;
                selectedChoice2 = true;
                round2Result = val; // 2=A,1=B,0=C
                if (val === 2) detailLevel = 2;
                else if (val === 1) detailLevel = 1;
                else detailLevel = 0;
                document.getElementById('choiceFeedback2').innerHTML = `<span class="correct-feedback">已選擇。</span>`;
                [optA, optB, optC].forEach(b => b.disabled = true);
                if (trustLevel === 2 && detailLevel === 0) {
                    loadStep(4);
                } else {
                    loadStep(5);
                }
            };
            if (optA) optA.onclick = () => handle(2);
            if (optB) optB.onclick = () => handle(1);
            if (optC) optC.onclick = () => handle(0);
        }
        else if (step === 4) {
            const optA = document.getElementById('choice3_A');
            const optB = document.getElementById('choice3_B');
            const optC = document.getElementById('choice3_C');
            const handle = (val) => {
                if (round3Result) return;
                round3Result = val;
                if (val === 2) {
                    finalOutcome = 3;
                    document.getElementById('thirdOutcomeMsg').innerHTML = '<span class="correct-feedback">米哈烏淚崩，全盤托出。證詞完整。</span>';
                } else if (val === 1) {
                    finalOutcome = 2;
                    document.getElementById('thirdOutcomeMsg').innerHTML = '<span class="correct-feedback">米哈烏說出部分，證詞殘缺。</span>';
                } else {
                    finalOutcome = 0;
                    document.getElementById('thirdOutcomeMsg').innerHTML = '<span class="wrong-feedback">米哈烏徹底放棄，審訊失敗。</span>';
                }
                [optA, optB, optC].forEach(b => b.disabled = true);
                const continueBtn = document.getElementById('continueAfterChoice3Btn');
                if (continueBtn) continueBtn.onclick = () => {
                    if (finalOutcome === 0) loadStep(12);
                    else loadStep(6);
                };
            };
            if (optA) optA.onclick = () => handle(2);
            if (optB) optB.onclick = () => handle(1);
            if (optC) optC.onclick = () => handle(0);
        }
        else if (step === 5) {
            const continueBtn = document.getElementById('continueAfterChoiceBtn');
            if (continueBtn) continueBtn.onclick = () => {
                if (finalOutcome === 0) loadStep(12);
                else loadStep(6);
            };
        }
        else if (step === 7) {
            const optA = document.getElementById('choice2_A');
            const optB = document.getElementById('choice2_B');
            const optC = document.getElementById('choice2_C');
            const handle = (isCorrect) => {
                if (selectedSecond) return;
                selectedSecond = true;
                secondChoiceCorrect = isCorrect;
                if (isCorrect) {
                    if (finalOutcome === 3) addEvidence(REAL_EVIDENCE_FULL);
                    else if (finalOutcome === 2) addEvidence(REAL_EVIDENCE_PARTIAL);
                    else addEvidence(FAKE_EVIDENCE_3);
                } else {
                    // 錯誤則不加入任何真證物
                }
                [optA, optB, optC].forEach(b => b.disabled = true);
                loadStep(8);
            };
            if (optA) optA.onclick = () => handle(true);
            if (optB) optB.onclick = () => handle(false);
            if (optC) optC.onclick = () => handle(false);
        }
        else if (step === 8) {
            const continueBtn = document.getElementById('continueAfterChoice2Btn');
            if (continueBtn) continueBtn.onclick = () => {
                if (secondChoiceCorrect && (finalOutcome === 3 || finalOutcome === 2)) loadStep(9);
                else loadStep(12);
            };
        }
        else if (step === 10) {
            const submitBtn = document.getElementById('submitPwdBtn');
            const input = document.getElementById('pwdInput');
            const feedback = document.getElementById('pwdFeedback');
            let localAttempts = 3;
            const check = () => {
                const val = input.value.trim();
                if (val === '031547') {
                    passwordSuccess = true;
                    addEvidence(REAL_EVIDENCE_2);
                    loadStep(11);
                } else {
                    localAttempts--;
                    if (localAttempts > 0) {
                        feedback.innerHTML = `<span class="wrong-feedback">密碼錯誤，剩餘次數：${localAttempts}</span>`;
                        document.querySelector('.attempts-left').innerText = `剩餘嘗試次數：${localAttempts}`;
                    } else {
                        passwordSuccess = false;
                        if (!evidenceCollected.some(e => e.name === FAKE_EVIDENCE_3.name)) addEvidence(FAKE_EVIDENCE_3);
                        loadStep(11);
                    }
                }
                input.value = '';
            };
            if (submitBtn) submitBtn.onclick = check;
        }
        else if (step === 11) {
            const continueBtn = document.getElementById('continueAfterPwdBtn');
            if (continueBtn) continueBtn.onclick = () => loadStep(12);
        }
        else if (step === 12) {
            const finishBtn = document.getElementById('finishBtn');
            if (finishBtn) finishBtn.onclick = () => finishAndSave();
        }
    }

    window.addEventListener('load', () => {
        const progress = loadProgress();
        if (progress.completed.N) {
            alert('你已經完成過 N 的調查，無法再次進入。');
            redirectToMain();
            return;
        }
        loadStep(0);
        document.getElementById('viewEvidenceBtn').addEventListener('click', () => {
            document.getElementById('evidenceModal').style.display = 'flex';
            updateEvidenceModal();
        });
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('evidenceModal').style.display = 'none';
        });
        document.getElementById('abandonBtn').addEventListener('click', abandon);
    });
</script>
</body>
</html>
